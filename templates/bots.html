<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет - Мои боты</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --primary-color: #4361ee;
    --accent-color: #7209b7;
    --light-bg: #f8f9fa;
    --dark-text: #212529;
    --border-color: #dee2e6;
    --sidebar-bg: #2d3748;
}

* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
body {display:flex; background-color:#f0f2f5; color:var(--dark-text); height:100vh; overflow:hidden;}
.sidebar {width:220px; background-color:var(--sidebar-bg); color:#fff; height:100vh; display:flex; flex-direction:column; justify-content:space-between; padding:20px 0;}
.logo-container {display:flex; align-items:center; padding:0 20px; margin-bottom:30px;}
.logo-img {width:40px; margin-right:10px;}
.logo-text {font-size:20px; font-weight:700;}
.nav-menu {flex-grow:1;}
.nav-item {display:flex; align-items:center; padding:12px 20px; cursor:pointer; transition:0.3s; color:#cbd5e0;}
.nav-item i {margin-right:10px; width:20px; text-align:center;}
.nav-item:hover, .nav-item.active {background-color:var(--primary-color); border-radius:8px; color:#fff;}
.user-profile {padding:20px; display:flex; align-items:center; border-top:1px solid rgba(255,255,255,0.1);}
.user-avatar {width:40px; height:40px; border-radius:50%; background: linear-gradient(to right, var(--primary-color), var(--accent-color)); display:flex; align-items:center; justify-content:center; margin-right:10px; font-weight:bold; color:white;}
.user-info {display:flex; flex-direction:column;}
.user-name {font-weight:600; margin-bottom:5px; color:white;}
.btn-logout {color:#cbd5e0; font-size:12px; text-decoration:none;}
.btn-logout:hover {color:#fff;}
.main-content {flex-grow:1; display:flex; flex-direction:column; background-color:#f0f2f5; height:100vh; overflow-y:auto; padding:20px;}
.dashboard-section {width:100%; max-width:800px; margin:0 auto;}
.card {background:white; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.05); margin-bottom:20px;}
.card-header {padding:16px 20px; border-bottom:1px solid var(--border-color);}
.card-header h4 {margin:0; font-weight:600;}
.card-body {padding:20px;}
.form-group {margin-bottom:1rem;}
.form-label {display:block; margin-bottom:0.5rem; font-weight:500;}
.form-control {display:block; width:100%; padding:0.5rem 0.75rem; font-size:1rem; line-height:1.5; color:#495057; background-color:#fff; border:1px solid #ced4da; border-radius:0.375rem;}
.btn {display:inline-block; font-weight:400; text-align:center; cursor:pointer; border:1px solid transparent; padding:0.5rem 0.75rem; font-size:1rem; border-radius:0.375rem;}
.btn-primary {color:#fff; background-color:var(--primary-color); border-color:var(--primary-color);}
.btn-sm {padding:0.25rem 0.5rem; font-size:0.875rem; border-radius:0.2rem;}
.btn-warning {color:#212529; background-color:#ffc107; border-color:#ffc107;}
.btn-success {color:#fff; background-color:#198754; border-color:#198754;}
.btn-danger {color:#fff; background-color:#dc3545; border-color:#dc3545;}
.bot-card {border:1px solid var(--border-color); border-radius:8px; padding:16px; margin-bottom:16px; background:var(--light-bg);}
.bot-card h5 {margin:0 0 12px; color:var(--primary-color);}
.bot-info {margin-bottom:12px; font-size:14px;}
.bot-actions {display:flex; gap:8px;}
.text-center {text-align:center;}
.text-muted {color:#6c757d !important;}
</style>
</head>
<body>
<header class="sidebar">
    <div class="logo-container">
        <img src="https://flang.tw1.ru/static/img/logo-header.svg" alt="Лого" class="logo-img">
        <span class="logo-text">INTOgroup</span>
    </div>
    <nav class="nav-menu">
    <div class="nav-item" onclick="window.location.href='/'">
        <i class="fas fa-home"></i><span>Рабочий стол</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/clients'">
        <i class="fas fa-users"></i><span>Клиенты</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/tasks'">
        <i class="fas fa-tasks"></i><span>Задачи</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/widgets'">
        <i class="fas fa-chart-pie"></i><span>Виджеты</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/chat'">
        <i class="fas fa-comment-dots"></i><span>Чат</span>
    </div>
    <div class="nav-item active" onclick="window.location.href='/bots'">
        <i class="fas fa-robot"></i><span>Мои боты</span>
    </div>
</nav>

    <div class="user-profile">
        <div class="user-avatar" id="userAvatar">П</div>
        <div class="user-info">
            <div class="user-name" id="userName">Парвиз</div>
            <a href="/logout" class="btn-logout">Выход</a>
        </div>
    </div>
</header>

<div class="main-content">
    <div class="dashboard-section">
        <h2>Управление ботами Telegram</h2>

        <div class="card mb-4">
            <div class="card-header"><h4>Добавить нового бота</h4></div>
            <div class="card-body">
                <form id="addBotForm">
                    <div class="form-group mb-3">
                        <label for="botName" class="form-label">Имя бота:</label>
                        <input type="text" class="form-control" id="botName" placeholder="Название бота">
                    </div>
                    <div class="form-group mb-3">
                        <label for="botToken" class="form-label">Token бота:</label>
                        <input type="text" class="form-control" id="botToken" placeholder="1234567890:ABCDEFGHIJKLMNOPQRSTUVWXYZ" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Добавить бота</button>
                    <small class="form-text text-muted">Получите token у @BotFather в Telegram.</small>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h4>Мои боты</h4></div>
            <div class="card-body" id="botsList">
                <div class="text-center text-muted py-4">У вас пока нет привязанных ботов. Добавьте первого бота выше.</div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/v1/user')
        .then(r => r.json())
        .then(user => {
            if (user.name) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userAvatar').textContent = user.name[0].toUpperCase();
            }
        });

    loadBots();

    document.getElementById('addBotForm').addEventListener('submit', function(e){
        e.preventDefault();
        addBot();
    });
});

function loadBots() {
    fetch('/api/v1/bots')
    .then(r => r.json())
    .then(bots => {
        const list = document.getElementById('botsList');
        if (!bots.length) {
            list.innerHTML = `<div class="text-center text-muted py-4">У вас пока нет привязанных ботов. Добавьте первого бота выше.</div>`;
            return;
        }
        list.innerHTML = bots.map(bot => `
            <div class="bot-card">
                <h5>${bot.bot_name}</h5>
                <div class="bot-info">
                    <strong>Token:</strong> ${bot.bot_token.substring(0,15)}...<br>
                    <strong>Статус:</strong> ${bot.is_active ? 'Активен' : 'Неактивен'}<br>
                    <strong>Добавлен:</strong> ${new Date(bot.created_at || Date.now()).toLocaleDateString()}
                </div>
                <div class="bot-actions">
                    <button class="btn btn-sm ${bot.is_active ? 'btn-warning':'btn-success'}"
                        onclick="toggleBot(${bot.id},${!bot.is_active})">
                        ${bot.is_active?'Деактивировать':'Активировать'}
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="deleteBot(${bot.id})">Удалить</button>
                </div>
            </div>`).join('');
    });
}

function addBot() {
    const name = document.getElementById('botName').value.trim() || "Без имени";
    const token = document.getElementById('botToken').value.trim();
    if (!token) { alert('Введите token'); return; }

    fetch('/api/v1/bots', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({bot_name:name, bot_token:token})
    }).then(r => r.json())
      .then(()=> { document.getElementById('botName').value=''; document.getElementById('botToken').value=''; loadBots(); });
}

function deleteBot(id) {
    if(!confirm('Удалить бота?')) return;
    fetch(`/api/v1/bots/${id}`, {method:'DELETE'}).then(()=>loadBots());
}

function toggleBot(id,status) {
    fetch(`/api/v1/bots/${id}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({is_active:status})})
    .then(()=>loadBots());
}
</script>
</body>
</html>
